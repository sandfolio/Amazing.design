<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wireframe UI Kit — Demo</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="kit.css">
<script src="../../assets/wf-icons.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
<script>
  // Scale the device to fit the viewport (keeps the whole phone visible).
  function fitDevice() {
    const wrap = document.querySelector('.k-stagewrap');
    if (!wrap) return;
    wrap.style.transform = 'none';
    const pad = 48;
    const h = wrap.offsetHeight, w = wrap.offsetWidth;
    const s = Math.min(1, (window.innerHeight - pad) / h, (window.innerWidth - pad) / w);
    wrap.style.transformOrigin = 'center center';
    wrap.style.transform = 'scale(' + s + ')';
  }
  window.addEventListener('resize', fitDevice);
  // device mounts after Babel compiles — poll briefly until present
  let tries = 0;
  const iv = setInterval(() => { fitDevice(); if (document.querySelector('.k-stagewrap') || tries++ > 40) clearInterval(iv); }, 100);
</script>
</body>
</html>
