<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--wf-surface);}
  .card{padding:28px 32px;box-sizing:border-box;display:flex;gap:28px;align-items:flex-start;}
  /* sticky note */
  .note{width:170px;background:var(--wf-accent);border-radius:4px;padding:14px 16px;
        font:600 14px var(--wf-font-ui);color:var(--wf-accent-text);line-height:1.45;box-shadow:var(--wf-shadow-sm);}
  /* comment pin */
  .comment{display:flex;flex-direction:column;gap:8px;}
  .pin{width:38px;height:38px;border-radius:50% 50% 50% 2px;background:var(--wf-ink);display:flex;align-items:center;justify-content:center;
       font:700 14px var(--wf-font-ui);color:#fff;}
  .bubble{background:#fff;border:1.5px solid var(--wf-ink);border-radius:10px;padding:10px 12px;width:160px;font:400 13px var(--wf-font-ui);color:var(--wf-ink);line-height:1.4;}
  /* dashed spec + cursor */
  .spec{position:relative;width:150px;height:96px;border:1px dashed var(--wf-accent-strong);border-radius:6px;display:flex;align-items:center;justify-content:center;}
  .dim{position:absolute;top:-10px;background:var(--wf-surface);padding:0 6px;font:600 11px var(--wf-font-ui);color:var(--wf-accent-text);}
  .cur{width:34px;height:34px;background:var(--wf-ink-strong);filter:drop-shadow(0 4px 6px rgba(64,80,106,.4));
       -webkit-mask:url(../assets/cursor-pointer.svg) center/contain no-repeat;mask:url(../assets/cursor-pointer.svg) center/contain no-repeat;}
</style>
</head>
<body>
<div class="card">
  <div class="note">Annotate flows with sticky notes &amp; comments.</div>
  <div class="comment">
    <div class="pin">3</div>
    <div class="bubble">Make this CTA primary?</div>
  </div>
  <div class="spec"><span class="dim">150 × 96</span><span class="cur"></span></div>
</div>
</body>
</html>
