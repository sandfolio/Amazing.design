<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--wf-surface);}
  .card{padding:30px 32px;box-sizing:border-box;display:flex;flex-direction:column;gap:12px;}
  .row{display:flex;align-items:center;gap:14px;}
  .bar{height:18px;background:var(--wf-ink);border-radius:3px;}
  .lab{font:700 12px var(--wf-font-ui);color:var(--wf-ink);width:40px;}
  .val{font:400 11px var(--wf-font-ui);color:var(--wf-muted);}
</style>
</head>
<body>
<div class="card">
  <div class="row"><span class="lab">1</span><div class="bar" style="width:4px"></div><span class="val">4px</span></div>
  <div class="row"><span class="lab">2</span><div class="bar" style="width:8px"></div><span class="val">8px</span></div>
  <div class="row"><span class="lab">3</span><div class="bar" style="width:12px"></div><span class="val">12px</span></div>
  <div class="row"><span class="lab">4</span><div class="bar" style="width:16px"></div><span class="val">16px</span></div>
  <div class="row"><span class="lab">5</span><div class="bar" style="width:24px"></div><span class="val">24px</span></div>
  <div class="row"><span class="lab">6</span><div class="bar" style="width:32px"></div><span class="val">32px</span></div>
  <div class="row"><span class="lab">7</span><div class="bar" style="width:48px"></div><span class="val">48px · 8pt base scale</span></div>
</div>
</body>
</html>
