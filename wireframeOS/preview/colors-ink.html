<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--wf-surface);}
  .card{padding:26px 32px;box-sizing:border-box;}
  .grid{display:flex;gap:18px;}
  .sw{display:flex;flex-direction:column;gap:8px;}
  .chip{width:118px;height:74px;border-radius:var(--wf-r-sm);box-shadow:var(--wf-shadow-inset);}
  .name{font:700 13px var(--wf-font-ui);color:var(--wf-ink);}
  .hex{font:400 12px var(--wf-font-ui);color:var(--wf-muted);}
</style>
</head>
<body>
<div class="card">
  <div class="grid">
    <div class="sw"><div class="chip" style="background:var(--wf-ink)"></div><span class="name">Ink / Primary</span><span class="hex">#545F71</span></div>
    <div class="sw"><div class="chip" style="background:var(--wf-ink-strong)"></div><span class="name">Ink Strong</span><span class="hex">#2A3A53</span></div>
    <div class="sw"><div class="chip" style="background:var(--wf-ink-2)"></div><span class="name">Ink 2</span><span class="hex">#667080</span></div>
    <div class="sw"><div class="chip" style="background:var(--wf-text)"></div><span class="name">Text</span><span class="hex">#1F2933</span></div>
  </div>
</div>
</body>
</html>
