<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--wf-surface);}
  .card{padding:26px 32px;box-sizing:border-box;}
  .grid{display:flex;gap:22px;align-items:flex-end;}
  .sw{display:flex;flex-direction:column;gap:8px;align-items:center;}
  .box{width:100px;height:58px;border-radius:var(--wf-r-md);}
  .name{font:700 12px var(--wf-font-ui);color:var(--wf-ink);}
  .val{font:400 11px var(--wf-font-ui);color:var(--wf-muted);}
</style>
</head>
<body>
<div class="card">
  <div class="grid">
    <div class="sw"><div class="box" style="border:1px solid var(--wf-ink)"></div><span class="name">Hairline</span><span class="val">1px ink</span></div>
    <div class="sw"><div class="box" style="border:1.5px solid var(--wf-ink)"></div><span class="name">Default</span><span class="val">1.5px ink</span></div>
    <div class="sw"><div class="box" style="border:1px solid var(--wf-fill)"></div><span class="name">Divider</span><span class="val">1px fill</span></div>
    <div class="sw"><div class="box" style="border:1px dashed var(--wf-accent)"></div><span class="name">Annotation</span><span class="val">1px dashed</span></div>
  </div>
</div>
</body>
</html>
