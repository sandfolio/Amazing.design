<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--wf-surface);}
  .card{padding:26px 32px;box-sizing:border-box;}
  .grid{display:flex;gap:20px;align-items:flex-end;}
  .sw{display:flex;flex-direction:column;gap:8px;align-items:center;}
  .box{width:96px;height:64px;background:var(--wf-fill);border:var(--wf-stroke);}
  .name{font:700 12px var(--wf-font-ui);color:var(--wf-ink);}
  .val{font:400 11px var(--wf-font-ui);color:var(--wf-muted);}
</style>
</head>
<body>
<div class="card">
  <div class="grid">
    <div class="sw"><div class="box" style="border-radius:var(--wf-r-sm)"></div><span class="name">sm</span><span class="val">8px</span></div>
    <div class="sw"><div class="box" style="border-radius:var(--wf-r-md)"></div><span class="name">md</span><span class="val">12px</span></div>
    <div class="sw"><div class="box" style="border-radius:var(--wf-r-lg)"></div><span class="name">lg</span><span class="val">24px</span></div>
    <div class="sw"><div class="box" style="border-radius:var(--wf-r-pill);width:120px"></div><span class="name">pill</span><span class="val">999px</span></div>
  </div>
</div>
</body>
</html>
