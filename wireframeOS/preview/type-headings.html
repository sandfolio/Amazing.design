<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--wf-surface);}
  .card{padding:26px 32px;box-sizing:border-box;display:flex;flex-direction:column;gap:14px;}
  .row{display:flex;align-items:baseline;gap:16px;}
  .tag{font:600 11px var(--wf-font-ui);color:var(--wf-muted);width:120px;flex:none;letter-spacing:-0.01em;}
</style>
</head>
<body>
<div class="card">
  <div class="row"><span class="tag">H1 · 32 / 700</span><span class="wf-h1">Heading one</span></div>
  <div class="row"><span class="tag">H2 · 28 / 700</span><span class="wf-h2">Heading two</span></div>
  <div class="row"><span class="tag">H3 · 24 / 600</span><span class="wf-h3">Heading three</span></div>
  <div class="row"><span class="tag">H4 · 18 / 600</span><span class="wf-h4">Heading four</span></div>
</div>
</body>
</html>
