<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--wf-surface);}
  .card{padding:26px 32px;box-sizing:border-box;display:flex;flex-direction:column;gap:16px;}
  .row{display:flex;gap:14px;align-items:center;flex-wrap:wrap;}
  .btn{font:700 16px var(--wf-font-ui);letter-spacing:var(--wf-tracking-tight);
       padding:12px 24px;border-radius:var(--wf-r-md);cursor:pointer;border:1.5px solid var(--wf-ink);}
  .primary{background:var(--wf-ink);color:#fff;}
  .secondary{background:var(--wf-fill);color:var(--wf-ink);border-color:var(--wf-fill);}
  .outline{background:transparent;color:var(--wf-ink);}
  .pill{border-radius:var(--wf-r-pill);}
  .disabled{opacity:.4;cursor:not-allowed;}
  .lab{font:600 11px var(--wf-font-ui);color:var(--wf-muted);width:100%;letter-spacing:-0.01em;}
</style>
</head>
<body>
<div class="card">
  <div class="row">
    <button class="btn primary">Primary</button>
    <button class="btn secondary">Secondary</button>
    <button class="btn outline">Outline</button>
    <button class="btn primary disabled">Disabled</button>
  </div>
  <div class="row">
    <button class="btn primary pill">Pill</button>
    <button class="btn secondary pill">Pill</button>
    <button class="btn outline pill">Pill</button>
    <button class="btn primary pill disabled">Pill</button>
  </div>
</div>
</body>
</html>
